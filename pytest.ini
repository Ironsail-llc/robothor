[pytest]
asyncio_mode = auto
timeout = 30
addopts = --import-mode=importlib
markers =
    slow: marks tests as slow (real LLM calls, >10s)
    integration: real DB/Redis cross-service tests
    unit: fast unit tests, no external dependencies
    llm: requires Ollama/Qwen running
    e2e: full system end-to-end tests
    smoke: infrastructure health checks
    vision: requires vision dependencies (ultralytics, insightface, onnxruntime)
testpaths =
    tests
    robothor/engine/tests
    crm/bridge/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
