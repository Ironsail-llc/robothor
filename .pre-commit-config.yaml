ci:
  autofix_prs: true
  autoupdate_schedule: monthly
  skip: [validate-agents]  # local hook, runs in CI workflow instead

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: check-instance-leak
        name: check for instance data in platform files
        entry: python3 scripts/check_instance_leak.py
        language: system
        always_run: true
        pass_filenames: false
      - id: validate-agents
        name: validate agent manifests
        entry: python3 scripts/validate_agents.py
        language: system
        files: 'docs/agents/.*\.yaml'
        pass_filenames: false
      - id: claude-md-size
        name: check CLAUDE.md line counts (max 80)
        entry: scripts/check_claude_md_size.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: check-deleted-references
        name: check deleted .py files for dangling references
        entry: scripts/check_deleted_refs.sh
        language: script
        always_run: true
        pass_filenames: false
