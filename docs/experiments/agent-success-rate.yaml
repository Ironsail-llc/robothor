# Example experiment: Optimise the fleet-wide agent success rate.
#
# This experiment iterates on agent instruction files and manifest settings
# to improve the percentage of agent runs that complete successfully.

id: agent-success-rate
metric_name: "Fleet agent success rate (%)"
metric_command: |
  python3 -c "
  from robothor.db import get_connection
  with get_connection() as c:
    cur = c.cursor()
    cur.execute('''
      SELECT COUNT(*) FILTER (WHERE status = 'completed') * 100.0
             / NULLIF(COUNT(*), 0)
      FROM agent_runs
      WHERE started_at > NOW() - interval '24 hours'
    ''')
    print(round(cur.fetchone()[0] or 0, 2))
  "
direction: maximize

search_space: |
  You may modify:
  - brain/agents/*.md (agent instruction files — tone, procedures, rules)
  - docs/agents/*.yaml (manifest settings — model, max_iterations, timeout, v2 flags)
  You may NOT modify:
  - robothor/engine/ (engine source code)
  - robothor/memory/ (memory system code)
  - Database schema or migrations
  - Systemd service files

max_iterations: 15
min_improvement_pct: 1.0
measurement_samples: 3
measurement_delay_seconds: 0
revert_command: "git checkout -- brain/agents/ docs/agents/"
notify_on_improvement_pct: 5.0
cost_budget_usd: 3.0
tags: [autoresearch, fleet-health]
