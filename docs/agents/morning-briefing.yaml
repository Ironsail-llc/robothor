id: morning-briefing
name: Morning Briefing
description: Daily morning briefing with weather, news, calendar, and CRM activity
version: "2026-03-03"
department: briefings

reports_to: null
creates_tasks_for: []
receives_tasks_from: []
escalates_to: null

model:
  primary: openrouter/anthropic/claude-sonnet-4.6
  fallbacks:
    - openrouter/moonshotai/kimi-k2.5
    - gemini/gemini-2.5-pro
  payload_alias: sonnet

schedule:
  cron: "30 6 * * *"
  timezone: America/New_York
  timeout_seconds: 480
  max_iterations: 10
  session_target: isolated

delivery:
  mode: announce
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed: []
tools_denied:
  - create_message
  - make_call
  - transmit_prescription
bridge_endpoints:
  - "GET /health"
  - "GET /api/conversations"
streams:
  read: [email, calendar, health]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
review_workflow: false
notification_inbox: false
status_file: null
shared_working_state: false

warmup:
  memory_blocks:
    - user_profile
    - shared_working_state
    - nightwatch_log
  context_files:
    - brain/memory/garmin-health.md
    - brain/memory/cron-health-status.md
    - brain/memory/email-classifier-status.md
    - brain/memory/overnight-pr-status.md
instruction_file: brain/agents/morning-briefing.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: []

v2:
  error_feedback: true

changelog:
  - date: "2026-03-03"
    change: "Fix instruction_file (was null), upgrade model to Sonnet 4.6, add missing tools (list_tasks, list_my_tasks, memory_block_read, etc), add shared_working_state warmup + status file context"
  - date: "2026-02-28"
    change: "Wire garmin-health.md into warmup context_files (was missing despite changelog claim)"
  - date: "2026-02-27"
    change: "Add health section in payload (garmin-health.md)"
  - date: "2026-02-24"
    change: "Initial manifest creation; agentId changed from 'main' to 'morning-briefing'"
