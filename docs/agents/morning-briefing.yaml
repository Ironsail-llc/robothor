id: morning-briefing
name: Morning Briefing
description: Daily morning briefing with calendar, tasks, overnight activity, and health stats
version: "2026-03-16"
department: briefings

reports_to: null
creates_tasks_for: []
receives_tasks_from: []
escalates_to: null

model:
  primary: openrouter/anthropic/claude-sonnet-4-6
  fallbacks:
    - gemini/gemini-2.5-pro
    - ollama_chat/qwen3.5:122b

schedule:
  cron: "30 6 * * *"
  timezone: America/New_York
  timeout_seconds: 480
  max_iterations: 10
  session_target: isolated

delivery:
  mode: announce
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - read_file
  - exec
  - search_memory
  - get_entity
  - memory_block_read
  - list_tasks
  - list_my_tasks
  - list_notes
  - create_note
  - gws_calendar_list
  - list_tasks_summary
tools_denied:
  - create_message
  - make_call
  - transmit_prescription
bridge_endpoints:
  - "GET /health"
  - "GET /api/conversations"
streams:
  read: [email, calendar, health]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
review_workflow: false
notification_inbox: false
status_file: null
shared_working_state: false

warmup:
  memory_blocks:
    - user_profile
    - shared_working_state
  context_files:
    - brain/memory/garmin-health.md
    - brain/memory/cron-health-status.md

instruction_file: brain/agents/morning-briefing.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: []

v2:
  error_feedback: true
  guardrails:
    - exec_allowlist
  exec_allowlist:
    - "^gog calendar events"
    - "^gws calendar"

changelog:
  - date: "2026-03-16"
    change: "Swap primary z-ai/glm-5 → claude-sonnet-4-6 (proactive — z-ai fleet-wide hang, task 08d64e1a; morning-briefing is last unaddressed z-ai primary agent)"
  - date: "2026-03-09"
    change: "Swap to GLM-5 — gws_calendar_list needs reliable multi-param tool calls"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-06"
    change: "Add overnight-pr-status.md to warmup context_files for Nightwatch PR updates"
  - date: "2026-03-03"
    change: "Fix instruction_file path, add missing tools (list_tasks, list_my_tasks, list_notes, create_note)"
  - date: "2026-02-27"
    change: "Add health stream (garmin-health.md) + health section in payload"
  - date: "2026-02-24"
    change: "Initial manifest creation from existing config"
