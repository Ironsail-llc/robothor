id: proactive-check
name: Proactive Check
description: Lightweight agent that evaluates proactive triggers and decides whether to act
version: "2026-04-03"
department: operations

reports_to: main
creates_tasks_for: []
receives_tasks_from: []
escalates_to: main

tags_produced: [proactive]
tags_consumed: []

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro
  payload_alias: mimo

schedule:
  cron: ""  # event-triggered only
  timezone: America/New_York
  timeout_seconds: 120
  max_iterations: 5
  session_target: isolated

delivery:
  mode: none
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - search_memory
  - list_tasks
  - get_inbox
  - read_file
  - write_file
  - spawn_agent
tools_denied: []

streams:
  read: [system]
  write: [agent]

task_protocol: false
auto_task: false
review_workflow: false
notification_inbox: false
status_file: brain/memory/proactive-check-status.md
shared_working_state: false

hooks:
  - stream: system
    event_type: proactive.trigger

warmup:
  context_files:
    - brain/memory/proactive-check-status.md

instruction_file: brain/agents/PROACTIVE_CHECK.md
bootstrap_files:
  - brain/AGENTS.md

v2:
  error_feedback: true
  cost_budget_usd: 0.50
  can_spawn_agents: true
  guardrails:
    - no_destructive_writes

changelog:
  - date: "2026-04-03"
    change: "Initial creation — KAIROS Phase 2 proactive self-prompting"
