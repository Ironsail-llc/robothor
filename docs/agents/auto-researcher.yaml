id: auto-researcher
name: Auto Researcher
description: Runs iterative optimization experiments on business metrics using the autoresearch pattern
version: "2026-03-31"
department: operations

reports_to: main
creates_tasks_for: []
receives_tasks_from: [main, agent-architect]
escalates_to: main

tags_produced: [autoresearch, optimization]
tags_consumed: []

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: ""  # Triggered manually or via task assignment
  timezone: America/New_York
  timeout_seconds: 900
  max_iterations: 30
  session_target: isolated

delivery:
  mode: announce
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - exec
  - read_file
  - write_file
  - list_directory
  - memory_block_read
  - memory_block_write
  - memory_block_list
  - experiment_create
  - experiment_measure
  - experiment_commit
  - experiment_status
  - deep_reason
  - search_memory
  - store_memory
  - get_agent_stats
  - list_agent_runs
  - spawn_agent
  - web_fetch
tools_denied: []

streams:
  read: [agent, system]
  write: [agent]

task_protocol: true
review_workflow: false
notification_inbox: false
status_file: brain/memory/auto-researcher-status.md
shared_working_state: false

warmup:
  context_files:
    - brain/memory/auto-researcher-status.md
  memory_blocks: []

instruction_file: brain/agents/AUTO_RESEARCHER.md
bootstrap_files:
  - brain/AGENTS.md

v2:
  error_feedback: true
  planning_enabled: true
  scratchpad_enabled: true
  can_spawn_agents: true
  cost_budget_usd: 3.00
  guardrails:
    - no_destructive_writes
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/auto-researcher-status.md"
    - "brain/agents/*.md"
    - "docs/agents/*.yaml"
    - "docs/experiments/*.yaml"

changelog:
  - date: "2026-03-31"
    change: "Initial creation — AutoResearch optimization experiment system"
