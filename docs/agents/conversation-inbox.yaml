id: conversation-inbox
name: Conversation Inbox Monitor
description: Checks for urgent unread messages in open conversations
version: "2026-03-16"
department: communications

reports_to: main
creates_tasks_for: []
receives_tasks_from: []
escalates_to: main

model:
  primary: openrouter/anthropic/claude-sonnet-4-6
  fallbacks:
    - gemini/gemini-2.5-pro
    - ollama_chat/qwen3.5:122b

schedule:
  cron: "5 6-22 * * *"
  timezone: America/New_York
  timeout_seconds: 420
  max_iterations: 5
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - list_conversations
  - list_messages
  - toggle_conversation_status
  - create_task
  - get_inbox
  - ack_notification
  - append_to_block
  - list_my_tasks
  - update_task
  - resolve_task
tools_denied:
  - message
bridge_endpoints:
  - "GET /health"
  - "GET /api/conversations"
  - "GET /api/conversations/*/messages"
  - "POST /api/conversations/*/toggle_status"
  - "POST /api/tasks"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [crm]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
auto_task: true
review_workflow: false
notification_inbox: true
status_file: brain/memory/conversation-inbox-status.md
shared_working_state: false

warmup:
  context_files:
    - brain/memory/conversation-inbox-status.md

instruction_file: brain/CONVERSATION_INBOX.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [conversation, escalation]
tags_consumed: []

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/conversation-inbox-status.md"

changelog:
  - date: "2026-03-16"
    change: "Swap primary z-ai/glm-5 → claude-sonnet-4-6 to eliminate 12.2% timeout rate (z-ai second-call hang, task 08d64e1a); also increase timeout_seconds 360→420 (coordinated with PR #28 correction)"
  - date: "2026-03-10"
    change: "Revert to GLM-5 — Qwen 3.5 122B caused intermittent timeouts (22% rate)"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-02-24"
    change: "Initial manifest creation; payload model fixed from qwen3-14b to kimi; added notification inbox RBAC"
