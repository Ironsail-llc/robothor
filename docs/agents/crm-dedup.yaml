id: crm-dedup
name: CRM Dedup
description: Contact duplicate detection, merge, and company hygiene
version: "2026-04-01"
department: crm

reports_to: main
creates_tasks_for: []
receives_tasks_from: []
escalates_to: main

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: "30 10 * * 1"
  timezone: America/New_York
  timeout_seconds: 300
  max_iterations: 10
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - list_people
  - update_person
  - update_company
  - merge_contacts
  - merge_companies
  - create_task
  - list_tasks
  - list_my_tasks
  - update_task
  - resolve_task
  - get_inbox
  - ack_notification
  - append_to_block
tools_denied:
  - message
bridge_endpoints:
  - "GET /health"
  - "GET /api/people"
  - "PATCH /api/people/*"
  - "PATCH /api/companies/*"
  - "POST /api/people/merge"
  - "POST /api/companies/merge"
  - "POST /api/tasks"
  - "GET /api/tasks"
  - "PATCH /api/tasks/*"
  - "GET /api/tasks/agent/*"
  - "POST /api/tasks/*/resolve"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [crm]
  write: [crm]

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: true
auto_task: true
review_workflow: true
notification_inbox: true
status_file: brain/memory/crm-dedup-status.md
shared_working_state: true

warmup:
  memory_blocks:
    - contacts_summary
  context_files:
    - brain/memory/crm-dedup-status.md

instruction_file: brain/agents/CRM_DEDUP.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [crm-hygiene, dedup]
tags_consumed: [crm-hygiene, dedup]

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/crm-dedup-status.md"

changelog:
  - date: "2026-04-01"
    change: "Split from crm-steward — owns duplicate detection, merge, and company hygiene phases"
