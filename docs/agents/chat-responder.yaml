id: chat-responder
name: Chat Responder
description: Responds to Google Chat messages as Robothor — gathers context and sends replies
version: "2026-03-15"
department: communications

reports_to: main
creates_tasks_for: []
receives_tasks_from: [chat-monitor]
escalates_to: main

model:
  primary: openrouter/anthropic/claude-sonnet-4-6  # Swapped from z-ai/glm-5: 22 timeouts/week from second-call hang
  fallbacks:
    - gemini/gemini-2.5-pro
    - openrouter/z-ai/glm-5  # Demoted to last-resort fallback

schedule:
  cron: "3,33 6-22 * * *"
  timezone: America/New_York
  timeout_seconds: 480
  max_iterations: 15
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - list_my_tasks
  - resolve_task
  - update_task
  - gws_chat_list_spaces
  - gws_chat_list_messages
  - gws_chat_send
  - gws_calendar_list
  - gws_gmail_search
  - web_search
  - web_fetch
  - append_to_block
  - create_task
tools_denied: [message]

streams:
  read: [chat]
  write: []

status_file: brain/memory/chat-responder-status.md
task_protocol: true
notification_inbox: false

warmup:
  context_files:
    - brain/memory/chat-responder-status.md
  memory_blocks:
    - persona

instruction_file: brain/agents/CHAT_RESPONDER.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [chat]
tags_consumed: [chat-respond]

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/chat-responder-status.md"

changelog:
  - date: "2026-03-15"
    change: "Swap primary z-ai/glm-5→claude-sonnet-4-6 — 22 timeouts/week from z-ai second-call hang (task 08d64e1a). z-ai demoted to last-resort fallback. Nightwatch self-heal [nightwatch]"
  - date: "2026-03-09"
    change: "Upgrade to GLM-5 for reliable tool-calling (Qwen 3.5 mishandled gws tool schemas)"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-06"
    change: "Initial manifest — Chat response agent with task protocol"
