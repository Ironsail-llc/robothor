id: evening-winddown
name: Evening Wind-Down
description: Daily evening summary with tomorrow preview and open items
version: "2026-03-21"
department: briefings

reports_to: null
creates_tasks_for: []
receives_tasks_from: []
escalates_to: null

model:
  primary: openrouter/anthropic/claude-sonnet-4.6
  fallbacks:
    - gemini/gemini-2.5-pro

schedule:
  cron: "0 21 * * *"
  timezone: America/New_York
  timeout_seconds: 600
  max_iterations: 15
  session_target: isolated

delivery:
  mode: announce
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - read_file
  - write_file
  - exec
  - search_memory
  - get_entity
  - memory_block_read
  - list_tasks
  - list_agent_tasks
  - gws_calendar_list
  - list_tasks_summary
  - web_search
  - web_fetch
  - create_note
  - append_to_block
tools_denied:
  - create_message
  - make_call
  - transmit_prescription
bridge_endpoints:
  - "GET /health"
  - "GET /api/conversations"
streams:
  read: [email, calendar, health]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
review_workflow: false
notification_inbox: false
status_file: null
shared_working_state: false

warmup:
  memory_blocks:
    - user_profile
    - shared_working_state
  context_files:
    - brain/memory/garmin-health.md
    - brain/memory/cron-health-status.md

instruction_file: brain/agents/evening-winddown.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: []

v2:
  error_feedback: true
  guardrails:
    - exec_allowlist
  exec_allowlist:
    - "^gog calendar"
    - "^gog telegram send"
    - "^gws calendar"

changelog:
  - date: "2026-03-21"
    change: "Add write_file + create_note to tools_allowed, expand exec_allowlist for telegram, fix blocked commands"
  - date: "2026-03-20"
    change: "Switch to Sonnet 4.6 (1M context), add web_search + web_fetch for news, bump timeout to 600s/15 iters"
  - date: "2026-03-09"
    change: "Swap to GLM-5 — gws_calendar_list needs reliable multi-param tool calls"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-03"
    change: "Fix instruction_file (was null), upgrade model to Sonnet 4.6, add missing tools (list_tasks, list_my_tasks, memory_block_read, etc), add shared_working_state warmup + status file context + response-status.md"
  - date: "2026-02-28"
    change: "Wire garmin-health.md into warmup context_files (was missing despite changelog claim)"
  - date: "2026-02-27"
    change: "Add health stream (garmin-health.md) + health section in payload"
  - date: "2026-02-24"
    change: "Initial manifest creation; agentId changed from 'main' to 'evening-winddown'"
