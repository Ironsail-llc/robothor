id: email-responder
name: Email Responder
description: Composes and sends email replies via gog gmail
version: "2026-03-09"
department: email

reports_to: main
creates_tasks_for: []
receives_tasks_from: [email-classifier]
escalates_to: main

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: "15 8-20/2 * * *"
  timezone: America/New_York
  timeout_seconds: 600
  max_iterations: 15
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - log_interaction
  - create_person
  - list_people
  - create_task
  - get_task
  - list_my_tasks
  - resolve_task
  - update_task
  - get_inbox
  - ack_notification
  - append_to_block
  - gws_gmail_search
  - gws_gmail_get
  - gws_gmail_send
tools_denied:
  - message
bridge_endpoints:
  - "GET /health"
  - "POST /log-interaction"
  - "POST /api/people"
  - "GET /api/people"
  - "POST /api/tasks"
  - "GET /api/tasks/*"
  - "PATCH /api/tasks/*"
  - "GET /api/tasks/agent/*"
  - "POST /api/tasks/*/resolve"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [email]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: true
auto_task: true
review_workflow: true
notification_inbox: true
status_file: brain/memory/response-status.md
shared_working_state: true

warmup:
  memory_blocks:
    - operational_findings
  context_files:
    - brain/memory/response-status.md
    - brain/memory/email-classifier-status.md
  peer_agents:
    - email-classifier
    - email-analyst

instruction_file: brain/RESPONDER.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: [email, reply-needed]

v2:
  error_feedback: true
  guardrails:
    - exec_allowlist
    - write_path_restrict
  exec_allowlist:
    - "^gog gmail (thread|send|search)"
    - "^gws gmail"
  write_path_allowlist:
    - "brain/memory/response-status.md"

changelog:
  - date: "2026-04-01"
    change: "Cron is now safety-net only — primary trigger is email-pipeline workflow via email.new hook (24/7)"
  - date: "2026-03-09"
    change: "Upgrade to GLM-5 for reliable tool-calling (Qwen 3.5 mishandled gws tool schemas)"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-01"
    change: "Add review_workflow: true for email reply approval"
  - date: "2026-02-28"
    change: "CRITICAL FIX: Add exec, read_file, write_file, search_memory, get_entity, store_memory — agent was blind without file access. Delivery→none."
  - date: "2026-02-24"
    change: Add get_task for task detail fetches
  - date: "2026-02-24"
    change: Initial manifest creation from existing config
  - date: "2026-02-23"
    change: Per-agent ID created, self-enriches from tasks