# Fleet-wide defaults — merged under each agent manifest.
# Agent-specific values always win. See engine/config.py:_deep_merge().

schedule:
  timezone: America/New_York
  timeout_seconds: 600
  stall_timeout_seconds: 300

v2:
  error_feedback: true
  guardrails:
    - no_destructive_writes
    - no_sensitive_data
    - rate_limit
