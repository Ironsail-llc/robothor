id: crm-enrichment
name: CRM Enrichment
description: RAG-first contact research and field enrichment (1 contact per run)
version: "2026-04-01"
department: crm

reports_to: main
creates_tasks_for: []
receives_tasks_from: []
escalates_to: main

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: "0 11 * * *"
  timezone: America/New_York
  timeout_seconds: 300
  max_iterations: 10
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - list_people
  - update_person
  - update_company
  - create_note
  - create_task
  - list_my_tasks
  - resolve_task
  - get_inbox
  - ack_notification
  - append_to_block
  - web_fetch
  - web_search
  # Apollo.io contact enrichment & search
  - apollo_search_people
  - apollo_enrich_person
  - apollo_search_companies
  - apollo_enrich_company
tools_denied:
  - message
bridge_endpoints:
  - "GET /health"
  - "GET /api/people"
  - "PATCH /api/people/*"
  - "PATCH /api/companies/*"
  - "POST /api/notes"
  - "POST /api/tasks"
  - "GET /api/tasks/agent/*"
  - "POST /api/tasks/*/resolve"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [crm]
  write: [crm]

task_protocol: true
notification_inbox: true
status_file: brain/memory/crm-enrichment-status.md
shared_working_state: true

warmup:
  memory_blocks:
    - contacts_summary
  context_files:
    - brain/memory/crm-enrichment-status.md

instruction_file: brain/agents/CRM_ENRICHMENT.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [enrichment]
tags_consumed: []

v2:
  error_feedback: true
  can_spawn_agents: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/crm-enrichment-status.md"

changelog:
  - date: "2026-04-01"
    change: "Split from crm-steward — owns RAG-first enrichment (1 contact per run)"
