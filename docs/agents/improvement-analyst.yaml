id: improvement-analyst
name: Improvement Analyst
description: Analyzes agent fleet performance trends and identifies improvement opportunities for overnight PRs
version: "2026-03-04"
department: operations

reports_to: main
creates_tasks_for: [overnight-pr]
receives_tasks_from: []
escalates_to: main

tags_produced: [nightwatch, self-improve]
tags_consumed: []

model:
  primary: openrouter/anthropic/claude-sonnet-4.6
  fallbacks:
    - gemini/gemini-2.5-pro
  payload_alias: sonnet

schedule:
  cron: ""  # DISABLED 2026-03-17 — was "0 2 * * *"
  timezone: America/New_York
  timeout_seconds: 480  # Increased from 300: synthesis LLM call alone takes 129–156s; 300s too tight
  max_iterations: 15
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - memory_block_read
  - memory_block_write
  - memory_block_list
  - create_task
  - list_tasks
  - list_my_tasks
  - resolve_task
  - update_task
  - list_agent_runs
  - get_agent_run
  - get_agent_stats
  - list_agent_schedules
tools_denied: []

streams:
  read: [agent, system]
  write: [agent]

task_protocol: true
review_workflow: false
notification_inbox: false
status_file: brain/memory/improvement-analyst-status.md
shared_working_state: false

warmup:
  context_files:
    - brain/memory/improvement-analyst-status.md
    - brain/memory/failure-analyzer-status.md
  memory_blocks:
    - performance_baselines
    - nightwatch_log

instruction_file: brain/agents/IMPROVEMENT_ANALYST.md
bootstrap_files:
  - brain/AGENTS.md

v2:
  error_feedback: true
  planning_enabled: true
  cost_budget_usd: 0.50
  guardrails:
    - no_destructive_writes
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/improvement-analyst-status.md"

changelog:
  - date: "2026-03-15"
    change: "Increase timeout 300s→480s — synthesis LLM call takes 129–156s alone; 300s too tight (33% timeout rate). Nightwatch self-heal [nightwatch]"
  - date: "2026-03-05"
    change: "Switched model to Sonnet 4.6 — all Nightwatch agents use Sonnet"
  - date: "2026-03-04"
    change: "Initial creation — Nightwatch Tier 2 improvement analysis"
