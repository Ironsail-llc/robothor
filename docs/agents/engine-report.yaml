id: engine-report
name: Engine Report
description: Daily summary of agent engine activity and health
version: "2026-03-09"
department: operations

reports_to: null
creates_tasks_for: []
receives_tasks_from: []
escalates_to: null

model:
  primary: ollama_chat/qwen3.5:122b
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4-6
    - gemini/gemini-2.5-pro
  payload_alias: qwen35

schedule:
  cron: "0 23 * * *"
  timezone: America/New_York
  timeout_seconds: 300
  session_target: isolated

delivery:
  mode: announce
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - list_agent_runs
  - get_agent_run
  - list_agent_schedules
  - get_agent_stats
tools_denied:
  - message
  - create_person
  - update_person
  - delete_person
  - web_search
  - web_fetch

streams:
  read: [agent]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
review_workflow: false
notification_inbox: false
status_file: null
shared_working_state: false

instruction_file: brain/ENGINE_REPORT.md
bootstrap_files: []

tags_produced: []
tags_consumed: []

v2:
  error_feedback: true

changelog:
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-02-27"
    change: "Initial creation — daily engine activity summary"