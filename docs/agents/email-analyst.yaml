id: email-analyst
name: Email Analyst
description: Analyzes complex emails for structured response preparation
version: "2026-03-17a"
department: email

reports_to: main
creates_tasks_for: [email-responder]
receives_tasks_from: [email-classifier]
escalates_to: main

model:
  primary: openrouter/z-ai/glm-5
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4-6
    - gemini/gemini-2.5-pro

schedule:
  cron: "30 8-20/6 * * *"
  timezone: America/New_York
  timeout_seconds: 480
  max_iterations: 10
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - create_task
  - list_my_tasks
  - resolve_task
  - update_task
  - get_inbox
  - ack_notification
  - append_to_block
tools_denied:
  - create_message
  - make_call
  - transmit_prescription
bridge_endpoints:
  - "GET /health"
  - "POST /api/tasks"
  - "PATCH /api/tasks/*"
  - "GET /api/tasks/agent/*"
  - "POST /api/tasks/*/resolve"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [email]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: true
auto_task: true
review_workflow: false
notification_inbox: true
status_file: brain/memory/email-analyst-status.md
shared_working_state: true

warmup:
  context_files:
    - brain/memory/email-analyst-status.md
    - brain/memory/email-classifier-status.md
  peer_agents:
    - email-classifier

instruction_file: brain/EMAIL_ANALYST.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: [email, analytical]

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/email-analyst-status.md"
    - "brain/memory/response-analysis.json"

changelog:
  - date: "2026-03-17"
    change: "Switch from Gemini 2.5 Flash to GLM-5 — Flash unreliable for agent tool use"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-02-28"
    change: "CRITICAL FIX: Add exec, read_file, write_file, search_memory, get_entity, store_memory — agent was blind without file access. Delivery→none."
  - date: "2026-02-27"
    change: Relax cron to 6h safety-net (primary trigger is downstream from email-classifier)
  - date: "2026-02-24"
    change: Add follow-up task creation for email-responder after analysis
  - date: "2026-02-24"
    change: Initial manifest creation from existing config
  - date: "2026-02-23"
    change: Per-agent ID created, rewritten for task-based pipeline