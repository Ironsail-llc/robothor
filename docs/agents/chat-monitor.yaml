id: chat-monitor
name: Chat Monitor
description: Classifies incoming Google Chat messages and routes them for response or escalation
version: "2026-03-08"
department: communications

reports_to: main
creates_tasks_for: [chat-responder]
receives_tasks_from: []
escalates_to: main
downstream_agents: [chat-responder]

model:
  primary: openrouter/z-ai/glm-5
  fallbacks:
    - openrouter/minimax/minimax-m2.5
    - gemini/gemini-2.5-pro
  payload_alias: glm5

schedule:
  cron: "0 6-22/6 * * *"
  timezone: America/New_York
  timeout_seconds: 480
  max_iterations: 8
  session_target: isolated
  enabled: false  # Disabled: chat-pipeline workflow (docs/workflows/chat-pipeline.yaml) is the canonical trigger

delivery:
  mode: none

hooks:
  - stream: chat
    event_type: chat.new_message
    message: "New Google Chat message detected. Read chat-log.json, classify messages, and create tasks."

tools_allowed:
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - create_task
  - list_tasks
  - gws_chat_list_messages
  - append_to_block
tools_denied: [message, gws_chat_send]

streams:
  read: [chat]
  write: []

status_file: brain/memory/chat-monitor-status.md
task_protocol: false
notification_inbox: false

warmup:
  context_files:
    - brain/memory/chat-monitor-status.md
    - brain/memory/chat-log.json

instruction_file: brain/agents/CHAT_MONITOR.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [chat, chat-respond, chat-info, escalation]
tags_consumed: []

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/chat-monitor-status.md"
    - "brain/memory/chat-log.json"

changelog:
  - date: "2026-03-08"
    change: "Disable standalone schedule (chat-pipeline workflow is canonical trigger — prevents dual-firing); increase timeout 300s→480s to match fleet standard [nightwatch]"
  - date: "2026-03-06"
    change: "Initial manifest — Chat message classifier"
