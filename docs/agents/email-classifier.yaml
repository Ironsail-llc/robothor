id: email-classifier
name: Email Classifier
description: Classifies incoming emails and creates tasks for response pipeline
version: "2026-03-09"
department: email

reports_to: main
creates_tasks_for: [email-analyst, email-responder]
receives_tasks_from: []
escalates_to: main

model:
  primary: openrouter/z-ai/glm-5
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4-6
    - gemini/gemini-2.5-pro

schedule:
  cron: "10 6-22/2 * * *"
  timezone: America/New_York
  timeout_seconds: 600
  max_iterations: 10
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - create_task
  - list_my_tasks
  - resolve_task
  - update_task
  - get_inbox
  - ack_notification
  - append_to_block
tools_denied:
  - create_message
  - make_call
  - transmit_prescription
bridge_endpoints:
  - "GET /health"
  - "POST /api/tasks"
  - "PATCH /api/tasks/*"
  - "GET /api/tasks/agent/*"
  - "POST /api/tasks/*/resolve"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [email]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: true
auto_task: true
review_workflow: false
notification_inbox: true
status_file: brain/memory/email-classifier-status.md
shared_working_state: true

warmup:
  context_files:
    - brain/memory/email-classifier-status.md
    - brain/memory/email-log.json
  peer_agents: []

instruction_file: brain/EMAIL_CLASSIFIER.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: [email, reply-needed, analytical, escalation, needs-philip, calendar, conflict, cancellation, scheduling-link, scheduling-booked, unknown-person, crm-hygiene]
tags_consumed: []

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/email-classifier-status.md"
    - "brain/memory/email-log.json"

changelog:
  - date: "2026-03-10"
    change: "Revert to GLM-5 — Qwen 3.5 122B caused timeouts and circuit breaker trips"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-08"
    change: "Add write_path_allowlist for status file and email log"
  - date: "2026-03-06"
    change: "Add append_to_block for shared working state updates"
  - date: "2026-03-03"
    change: "Add exec, read_file, write_file, search_memory, get_entity, store_memory — agent was blind without file access"
  - date: "2026-02-24"
    change: "Initial manifest creation from existing config"