id: canary
name: Canary
description: Test agent for validating error recovery, replanning, and helper spawning
version: "2026-03-17"
department: operations

reports_to: main
escalates_to: main

model:
  primary: openrouter/z-ai/glm-5
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: ""
  timezone: America/New_York
  timeout_seconds: 300
  max_iterations: 10
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - web_fetch
  - search_memory
  - store_memory

instruction_file: brain/instructions/CANARY.md
bootstrap_files: []

v2:
  error_feedback: true
  planning_enabled: true
  scratchpad_enabled: true
  can_spawn_agents: true
  max_nesting_depth: 2
  sub_agent_max_iterations: 5
  sub_agent_timeout_seconds: 60

changelog:
  - date: "2026-03-17"
    change: "Switch from local Qwen 3.5 to GLM-5 — free ~93 GB RAM, eliminate swap"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-02"
    change: "Initial creation"