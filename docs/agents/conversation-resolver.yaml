id: conversation-resolver
name: Conversation Resolver
description: Auto-resolves stale conversations older than 7 days
version: "2026-03-17"
department: communications

reports_to: main
creates_tasks_for: []
receives_tasks_from: []
escalates_to: main

model:
  primary: openrouter/z-ai/glm-5
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro

schedule:
  cron: "20 8,14,20 * * *"
  timezone: America/New_York
  timeout_seconds: 360
  max_iterations: 5
  session_target: isolated

delivery:
  mode: none

tools_allowed:
  - exec
  - read_file
  - write_file
  - search_memory
  - get_entity
  - store_memory
  - list_conversations
  - list_messages
  - toggle_conversation_status
  - list_tasks
  - get_inbox
  - ack_notification
  - append_to_block
  - create_task
  - list_my_tasks
  - update_task
  - resolve_task
tools_denied:
  - message
bridge_endpoints:
  - "GET /health"
  - "GET /api/conversations"
  - "GET /api/conversations/*/messages"
  - "POST /api/conversations/*/toggle_status"
  - "GET /api/tasks"
  - "GET /api/notifications/inbox/*"
  - "POST /api/notifications/*/ack"
  - "POST /api/memory/blocks/*/append"
streams:
  read: [crm]
  write: []

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: false
auto_task: true
review_workflow: false
notification_inbox: true
status_file: brain/memory/conversation-resolver-status.md
shared_working_state: true

warmup:
  context_files:
    - brain/memory/conversation-resolver-status.md

instruction_file: brain/CONVERSATION_RESOLVER.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

tags_produced: []
tags_consumed: [conversation]

v2:
  error_feedback: true
  guardrails:
    - write_path_restrict
  write_path_allowlist:
    - "brain/memory/conversation-resolver-status.md"

changelog:
  - date: "2026-03-17"
    change: "Switch from local Qwen 3.5 to GLM-5 — free ~93 GB RAM, eliminate swap"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-02-24"
    change: "Initial manifest creation; payload model fixed from qwen3-14b to kimi; added notification inbox RBAC"