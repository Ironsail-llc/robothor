id: main
name: Robothor
description: Primary agent — interactive Telegram chat + periodic heartbeat (worker oversight, escalation)
version: "2026-03-09"
department: core

reports_to: null
creates_tasks_for: [email-classifier, email-responder, crm-hygiene, crm-dedup, crm-enrichment]
receives_tasks_from: [email-classifier, calendar-monitor, conversation-inbox, vision-monitor, crm-dedup, email-responder]
escalates_to: null

tags_produced: [escalation, needs-philip]
tags_consumed: [escalation, needs-philip, calendar, conflict, cancellation, vision, unknown-person, conversation]

model:
  primary: openrouter/xiaomi/mimo-v2-pro
  fallbacks:
    - openrouter/anthropic/claude-sonnet-4.6
    - gemini/gemini-2.5-pro
  temperature: 0.5

schedule:
  cron: ""
  timezone: America/New_York
  timeout_seconds: 0                  # disabled — stall watchdog is the protection, no wall-clock cap
  stall_timeout_seconds: 600          # 10 min (was default 300) — complex interactive tasks need room
  max_iterations: 30
  session_target: persistent

delivery:
  mode: none
  channel: telegram
  to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"

tools_allowed:
  - list_conversations
  - get_conversation
  - list_messages
  - create_message
  - toggle_conversation_status
  - log_interaction
  - create_person
  - update_person
  - list_people
  - get_person
  - delete_person
  - create_company
  - update_company
  - list_companies
  - get_company
  - delete_company
  - create_note
  - list_notes
  - update_note
  - delete_note
  - create_task
  - update_task
  - get_task
  - delete_task
  - list_tasks
  - list_my_tasks
  - resolve_task
  - approve_task
  - reject_task
  - send_notification
  - get_inbox
  - ack_notification
  - search_memory
  - store_memory
  - get_entity
  - memory_block_read
  - memory_block_write
  - memory_block_list
  - append_to_block
  - search_records
  - get_metadata_objects
  - get_object_metadata
  - merge_people
  - merge_companies
  - look
  - who_is_here
  - enroll_face
  - set_vision_mode
  - web_search
  - web_fetch
  - read_file
  - list_directory
  - write_file
  - exec
  - list_agent_runs
  - get_agent_run
  - list_agent_schedules
  - get_agent_stats
  # Impetus One healthcare tools
  - search_patients
  - get_patient_details
  - get_patient_clinical_notes
  - get_patient_prescriptions
  - search_prescriptions
  - get_prescription_status
  - search_medications
  - search_pharmacies
  - get_appointments
  - list_actable_providers
  - create_prescription_draft
  - schedule_appointment
  - transmit_prescription
  # Deep reasoning (RLM)
  - deep_reason
  # Sub-agent spawning tools
  - spawn_agent
  - spawn_agents
  # In-conversation todo list
  - todo_write
  # Vault (credential store)
  - vault_get
  - vault_set
  - vault_list
  - vault_delete
  - list_tasks_summary
tools_denied: []

streams:
  read: [email, calendar, crm, vision, health, agent, system]
  write: [agent, system]

sla:
  urgent: 30m
  high: 2h
  normal: 8h
  low: 24h

task_protocol: true
review_workflow: true
notification_inbox: true
status_file: null
shared_working_state: true

instruction_file: brain/SOUL.md
bootstrap_files:
  - brain/AGENTS.md
  - brain/TOOLS.md

heartbeat:
  cron: "0 6-22 * * *"
  timezone: America/New_York
  instruction_file: brain/HEARTBEAT.md
  session_target: persistent          # remembers what it did last run
  max_iterations: 0                   # no soft check-in (disabled)
  safety_cap: 1000                    # very high hard cap (infinite-loop protection only)
  timeout_seconds: 3600               # 1 hour hard timeout (safety net)
  stall_timeout_seconds: 300          # 5 min no-activity = kill (primary protection)
  delivery:
    mode: announce
    channel: telegram
    to: "${ROBOTHOR_TELEGRAM_CHAT_ID}"
  context_files:
    - brain/memory/cron-health-status.md
    - brain/memory/garmin-health.md
    - brain/memory/email-classifier-status.md
    - brain/memory/email-analyst-status.md
  peer_agents: [email-classifier, email-responder, calendar-monitor]
  bootstrap_files: [brain/AGENTS.md, brain/TOOLS.md]

v2:
  can_spawn_agents: true
  todo_list_enabled: true              # Claude Code-style in-conversation checklist
  max_nesting_depth: 2
  sub_agent_max_iterations: 50        # was 10 — sub-agents need room to work
  sub_agent_timeout_seconds: 1800     # 30 min per sub-agent (was 900)

changelog:
  - date: "2026-03-09"
    change: "Upgrade to GLM-5 for reliable tool-calling (Qwen 3.5 mishandled gws tool schemas)"
  - date: "2026-03-09"
    change: "Swap to local Qwen 3.5 122B for cost savings & privacy"
  - date: "2026-03-01"
    change: "Enable sub-agent spawning — main can delegate focused sub-tasks to worker agents mid-run"
  - date: "2026-03-01"
    change: "Merged supervisor into main — heartbeat is now a feature of the main agent, not a separate entity"
  - date: "2026-02-27"
    change: "Created for Python Agent Engine — interactive Telegram chat"