[pytest]
asyncio_mode = auto
timeout = 120
markers =
    slow: marks tests as slow (real LLM calls)
    integration: marks integration tests
    unit: marks unit tests
    llm: marks tests that need Ollama/Qwen running
    e2e: marks full end-to-end pipeline tests
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
